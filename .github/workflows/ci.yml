name: CI (Common)

on:
  workflow_call:
    inputs:
      os:
        required: true
        type: string

jobs:
  build-and-test:
    name: Build & Test (${{ inputs.os }})
    runs-on: ${{ inputs.os }}

    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore CrossplaneSharp.sln

      - name: Build
        run: dotnet build CrossplaneSharp.sln --no-restore --configuration Release

      - name: Run tests
        run: dotnet test CrossplaneSharp.sln --no-build --configuration Release --verbosity normal --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ inputs.os }}
          path: "**/*.trx"
          retention-days: 7
